<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="hlpr builds AI solutions designed to help everyone." />
  <title>hlpr.com</title>

  <style>
    :root {
      --background: #000000;
      --foreground: #ffffff;
      --muted: rgba(255, 255, 255, 0.66);
      --line: rgba(255, 255, 255, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      background: var(--background);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--background);
      color: var(--foreground);
      font-family:
        "Google Sans",
        "Product Sans",
        "Avenir Next",
        Avenir,
        Inter,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 28px 40px 32px;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .brand-wordmark {
      display: block;
      font-size: 18px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.06em;
      white-space: nowrap;
    }

    .site-nav {
      display: flex;
      align-items: center;
      gap: 30px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .site-nav a {
      position: relative;
      padding: 6px 0;
      color: var(--muted);
      transition: color 180ms ease;
    }

    .site-nav a::after {
      content: "";
      position: absolute;
      left: 0;
      right: 100%;
      bottom: 0;
      height: 1px;
      background: var(--foreground);
      transition: right 180ms ease;
    }

    .site-nav a:hover,
    .site-nav a:focus-visible {
      color: var(--foreground);
    }

    .site-nav a:hover::after,
    .site-nav a:focus-visible::after {
      right: 0;
    }

    .hero {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      place-items: center;
      padding: clamp(20px, 6vh, 80px) 0;
    }

    .hero-copy {
      width: min(100%, 720px);
      text-align: center;
      transform: translateY(-2vh);
    }

    .hero-video {
      display: block;
      width: 100%;
      max-width: 720px;
      max-height: 100%;
      height: auto;
      margin: 0 auto;
      object-fit: contain;
    }

    .site-footer {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
      font-size: 13px;
      color: var(--muted);
    }

    .support-link {
      color: var(--foreground);
      transition: opacity 180ms ease;
    }

    .support-link:hover,
    .support-link:focus-visible {
      opacity: 0.66;
    }

    :focus-visible {
      outline: 2px solid var(--foreground);
      outline-offset: 5px;
      border-radius: 2px;
    }

    @media (max-width: 640px) {
      .page {
        padding: 18px 20px max(18px, env(safe-area-inset-bottom));
      }

      .site-nav {
        gap: 22px;
      }

      .hero {
        padding: 18px 0;
      }

      .hero-copy {
        width: 100%;
        max-height: 100%;
        transform: none;
      }

      .hero-video {
        max-height: calc(100dvh - 170px);
      }

      .site-footer {
        flex-direction: row;
        align-items: center;
        gap: 16px;
        padding-top: 16px;
        flex: 0 0 auto;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      *,
      *::before,
      *::after {
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body id="home">
  <div class="page">
    <header class="site-header" aria-label="Primary navigation">
      <a class="brand-mark" href="#home" aria-label="hlpr home">
        <span class="brand-wordmark">hlpr</span>
      </a>

      <nav class="site-nav" aria-label="Site links">
        <a href="#home">home</a>
        <a href="#support">support</a>
      </nav>
    </header>

    <main class="hero">
      <div class="hero-copy">
        <video
          id="hero-video"
          class="hero-video"
          autoplay
          muted
          playsinline
          preload="auto"
          aria-label="hlpr introduction video"
        >
          <source src="video.mp4" type="video/mp4" />
          Your browser does not support the video tag.
        </video>
      </div>
    </main>

    <footer class="site-footer" id="support">
      <span>need help?</span>
      <a class="support-link" href="mailto:support@hlprcorp.com">support@hlprcorp.com</a>
    </footer>
  </div>
  <script>
    const heroVideo = document.getElementById("hero-video");

    heroVideo.addEventListener("ended", () => {
      window.setTimeout(() => {
        heroVideo.currentTime = 0;
        heroVideo.play().catch(() => {});
      }, 10000);
    });
  </script>

</body>
</html>
