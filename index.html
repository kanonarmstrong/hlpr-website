<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta
    name="description"
    content="hlpr builds AI solutions designed to help everyone."
  />

  <title>hlpr. ai. for everyone.</title>

  <style>
    :root {
      --background: #000000;
      --foreground: #ffffff;
      --muted: rgba(255, 255, 255, 0.66);
      --line: rgba(255, 255, 255, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html {
      width: 100%;
      min-height: 100%;
      scroll-behavior: smooth;
      background: var(--background);
    }

    body {
      width: 100%;
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      margin: 0;
      overflow: hidden;
      background: var(--background);
      color: var(--foreground);
      font-family:
        "Google Sans",
        "Product Sans",
        "Avenir Next",
        Avenir,
        Inter,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      overflow: hidden;
      background: var(--background);
    }

    /*
      Fullscreen video
    */

    .hero {
      position: absolute;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--background);
    }

    .hero-video {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      object-fit: cover;
      object-position: center;
    }

    /*
      Header
    */

    .site-header {
      position: absolute;
      top: 0;
      right: 0;
      left: 0;
      z-index: 2;
      min-height: 38px;
      padding:
        max(28px, env(safe-area-inset-top))
        40px
        0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .brand-wordmark {
      display: block;
      font-size: 18px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.06em;
      white-space: nowrap;
    }

    .site-nav {
      display: flex;
      align-items: center;
      gap: 30px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .site-nav a {
      position: relative;
      padding: 6px 0;
      color: var(--muted);
      transition: color 180ms ease;
    }

    .site-nav a::after {
      content: "";
      position: absolute;
      right: 100%;
      bottom: 0;
      left: 0;
      height: 1px;
      background: var(--foreground);
      transition: right 180ms ease;
    }

    .site-nav a:hover,
    .site-nav a:focus-visible {
      color: var(--foreground);
    }

    .site-nav a:hover::after,
    .site-nav a:focus-visible::after {
      right: 0;
    }

    /*
      Footer
    */

    .site-footer {
      position: absolute;
      right: 40px;
      bottom: max(32px, env(safe-area-inset-bottom));
      left: 40px;
      z-index: 2;
      min-height: 34px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      font-size: 13px;
      color: var(--muted);
    }

    .support-link {
      color: var(--foreground);
      transition: opacity 180ms ease;
    }

    .support-link:hover,
    .support-link:focus-visible {
      opacity: 0.66;
    }

    /*
      Accessibility
    */

    :focus-visible {
      outline: 2px solid var(--foreground);
      outline-offset: 5px;
      border-radius: 2px;
    }

    /*
      Mobile
    */

    @media (max-width: 640px) {
      .site-header {
        padding:
          max(16px, env(safe-area-inset-top))
          20px
          0;
      }

      .site-nav {
        gap: 22px;
      }

      .site-footer {
        right: 20px;
        bottom: max(16px, env(safe-area-inset-bottom));
        left: 20px;
        min-height: auto;
        padding-top: 16px;
        align-items: center;
        gap: 16px;
      }

      .hero-video {
        object-position: center;
      }
    }

    /*
      Reduced motion
    */

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      *,
      *::before,
      *::after {
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body id="home">
  <div class="page">
    <main class="hero" aria-label="hlpr introduction">
      <video
        id="hero-video"
        class="hero-video"
        autoplay
        muted
        playsinline
        preload="auto"
        aria-label="hlpr introduction video"
      >
        <source src="./video.mp4" type="video/mp4" />
        Your browser does not  the video tag.
      </video>
    </main>

    <header class="site-header" aria-label="Primary navigation">
      <a class="brand-mark" href="#home" aria-label="hlpr home">
        <span class="brand-wordmark">hlpr</span>
      </a>

      <nav class="site-nav" aria-label="Site links">
        <a href="#home">home</a>
        <a href="#products">products</a>
      </nav>
    </header>

    <footer class="site-footer" id="support">
      <span>need help?</span>

      <a
        class="support-link"
        href="mailto:support@hlprcorp.com"
      >
        support@hlprcorp.com
      </a>
    </footer>
  </div>

  <script>
    const heroVideo = document.getElementById("hero-video");

    heroVideo.addEventListener("ended", () => {
      window.setTimeout(() => {
        heroVideo.currentTime = 0;
        heroVideo.play().catch(() => {});
      }, 10000);
    });
  </script>
</body>
</html>
